<div class="home-container">
  <div *ngIf="!registerMode">
    <h4 class="mat-display-1">
      Welcome to
      <u>Campgrounds</u>
    </h4>
    <p>Check out some of the camping sites in South Africa.</p>
    <div>
      <a class="register-link" (click)="toggleRegister()">don't have an account? Click here to Register</a>
    </div>
  </div>
  <div *ngIf="registerMode">
    <app-register (cancelRegister)="cancelRegisterMode($event)"></app-register>
  </div>
</div>
